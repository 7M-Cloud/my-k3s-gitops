apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-workloads
  namespace: argocd
spec:
  generators:
    - directory:
        # We target the specific app folders to avoid managing the root 'tenants' folder
        path: tenants/*/* exclude:
          # Exclude the namespace files so the 'CreateNamespace=true' option handles it
          - tenants/monitoring/namespace.yaml
          - tenants/platform-team/namespaces.yaml
  template:
    metadata:
      name: 'tenant-{{path.basename}}'
    spec:
      project: tenants
      source:
        repoURL: https://github.com/7M-Cloud/my-k3s-gitops.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        # segments[1] picks 'monitoring' or 'platform-team' from the path
        namespace: '{{path.segments[1]}}' 
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true