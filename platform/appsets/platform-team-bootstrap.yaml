apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-team-bootstrap
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/7M-Cloud/my-k3s-gitops.git
    targetRevision: main
    path: tenants/platform-team
    directory:
      # This ensures we only sync the namespace file, ignoring subfolders
      include: 'namespaces.yaml' 
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true