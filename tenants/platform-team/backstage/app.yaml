apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  annotations:
    argocd.argoproj.io/sync-wave: "2" # 👈 This tells it to wait for Wave 1 (the namespace)
spec:
  project: tenants
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 1.7.0
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-team