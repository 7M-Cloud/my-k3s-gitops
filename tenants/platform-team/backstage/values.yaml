global:
  imageRegistry: ""

backstage:
  image:
    registry: ""
    repository: backstage-ai
    tag: "1.0"
    pullPolicy: Never

  appConfig:
    app:
      title: "K3s Platform AI Portal"
      baseUrl: http://backstage.localhost
      extensions:
        - page:catalog:
            config:
              path: /

    proxy:
      endpoints:
        '/ai':
          target: http://ai-agent.ai-agent.svc.cluster.local
          changeOrigin: true

    backend:
      baseUrl: http://backstage.localhost
      listen:
        port: 7007
        host: 0.0.0.0

      # LAB ONLY: disables default backend auth enforcement
      auth:
        dangerouslyDisableDefaultAuthPolicy: true

      cors:
        origin: http://backstage.localhost
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true

    organization:
      name: "Local Lab"

    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true

    permission:
      enabled: false

ingress:
  enabled: true
  className: traefik
  host: backstage.localhost