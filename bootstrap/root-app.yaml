apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # Ensures cascading deletion
spec:
  project: default
  source:
    repoURL: https://github.com/7M-Cloud/my-k3s-gitops.git
    targetRevision: main
    path: platform/appsets # This tells the Root App where to look for your "Engine"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
