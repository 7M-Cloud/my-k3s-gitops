apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: in-cluster
            url: https://kubernetes.default.svc
            namespace: monitoring
  template:
    metadata:
      name: '{{cluster}}-grafana'
    spec:
      project: default
      source:
        # Point this to your personal repo
        repoURL: 'https://github.com/YOUR_USERNAME/YOUR_REPO.git'
        targetRevision: HEAD
        path: charts/grafana # Path to where the chart lives in your repo
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: '{{url}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true